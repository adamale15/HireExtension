services:
  extension-build:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env.local
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WXT_TELEMETRY_DISABLED: "1"
      CI: "1"
    volumes:
      - .:/app
      - hireextension_node_modules:/app/node_modules
      - hireextension_pnpm_store:/pnpm/store
    command: ["pnpm", "build"]

  extension-watch:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env.local
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WXT_TELEMETRY_DISABLED: "1"
      CI: "1"
    volumes:
      - .:/app
      - hireextension_node_modules:/app/node_modules
      - hireextension_pnpm_store:/pnpm/store
    command: ["pnpm", "watch"]

  extension-firefox-build:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - .env.local
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WXT_TELEMETRY_DISABLED: "1"
      CI: "1"
    volumes:
      - .:/app
      - hireextension_node_modules:/app/node_modules
      - hireextension_pnpm_store:/pnpm/store
    command: ["pnpm", "build:firefox"]

volumes:
  hireextension_node_modules:
  hireextension_pnpm_store:
